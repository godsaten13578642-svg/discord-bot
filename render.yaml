services:
  - type: web
    name: civilization-bot-backend
    env: docker
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: civilization-db
          property: connectionString
    
  - type: web
    name: civilization-bot-frontend
    env: docker
    region: oregon
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: REACT_APP_API_URL
        value: https://civilization-bot-backend.onrender.com

databases:
  - name: civilization-db
    databaseName: civilization_bot
    region: oregon
    plan: free
